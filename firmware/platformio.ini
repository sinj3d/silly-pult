; PlatformIO Configuration for Silly-Pult Catapult
; Board: Freenove ESP32-S3 WROOM
; Framework: Arduino

[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

; Serial monitor
monitor_speed = 115200

; FastAccelStepper uses hardware peripherals for jitter-free stepping
; even while WiFi is active
lib_deps =
    gin66/FastAccelStepper @ ^0.30.13

; Build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
